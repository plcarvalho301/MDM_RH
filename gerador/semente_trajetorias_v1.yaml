      - {tipo: ALTERACAO_FUNCAO, movimento: designacao, funcao: "FCE 1.10", offset_meses: [6, 18]}
      - {tipo: ALTERACAO_FUNCAO, movimento: dispensa_pedido, offset_meses: [10, 14]}
