# =============================================================================
# MDM-RH — SEMENTE DE TRAJETÓRIAS (Reino Animal) — v1
# Data: 2026-07-05
# Origem: handoff do designer (historinhas/eventos/xlsx v0.2), NORMALIZADO para
#   o vocabulário do catálogo v1.1. A planilha do designer permanece artefato
#   dele; ESTE arquivo é o insumo do gerador (MDM é soberano — a ferramenta
#   adapta ao modelo, nunca o contrário).
# Normalizações aplicadas (sessão 2026-07-05):
#   - Linhas "(fim afastamento)/(fim cessão)/(renovação)" REMOVIDAS: ⚠3 fechado
#     como data_fim + segundo registro (ADR-008). Duração vive em `duracao_meses`.
#   - Gerson: cassação = DESLIGAMENTO motivo CASS_APOSENT (⚠1, ADR-004).
#   - Vicente: anulação = DESLIGAMENTO motivo ANUL_PROVIMENTO (⚠2, ADR-004).
#   - Elias/Vicente: demissão = motivo DEMI_OFICIO (distinto de exoneração 08).
#   - Contrato de repetição: AUSENTE/null = contagem aberta (gerador decide);
#     inteiro = contagem exata; 0 PROIBIDO.
#   - PROGRESSAO: não listada marco a marco — derivada por REGRA (portaria mensal
#     na competência do ingresso, interstício 12m, grade EPPGG, para no teto).
#     `progressao.modo`: minimo_legal (até desligar) | ate_teto | n (contagem).
#   - Bifurcações do designer NÃO entram na base (são do gerador de desvios,
#     próximo incremento) — registradas em `bifurcacao` como documentação.
# Pesos: Camada A = % de PESSOAS (não vínculos; Bruno tem 2). Normalizados dos
#   96% do designer p/ 100%. ⚠ chute demográfico informado, sem lastro na
#   população real — corrigir contra o número real quando houver (nota §3 dele).
# =============================================================================

parametros_default:
  data_base: 2026-06-30          # "hoje" da massa; FOTO projetada nesta data
  intersticio_meses: 12          # placeholder confirmado (EPPGG: 20 degraus ≈ 20 anos)
  grade_carreira:                # seed_dominios §9 (EPPGG, pré-MP 1.286/2024)
    classes: [A, B, C, ESPECIAL]
    padroes: [I, II, III, IV, V]
  frac_fechamento_dois_registros: 0.25   # ADR-008: fração de intercorrências emitidas
                                         # como par aberto+fechamento (exercita coalescência)
  pct_acumulacao_bruno: 0.03     # massa v0.3 §6 (A4)

# ---------------------------------------------------------------------------
# CAMADA A — moldes (peso = fração de PESSOAS; escala com o N do piloto)
# offset_meses: [min,max] após o marco anterior (jitter por seed).
# duracao_meses em intercorrências: vira data_fim (ADR-008).
# ---------------------------------------------------------------------------
camada_A:

  - id: 1
    nome: "Wallace Preguição"
    peso: 0.396                  # 38/96
    cargo: Analista
    carreira_anos: [33, 37]
    progressao: {modo: minimo_legal, repeticao: 6}
    marcos:
      - {tipo: DESLIGAMENTO, motivo: "38", marco: fim_carreira}   # aposentadoria voluntária
    valor_teste: "caso base; ~420 meses de FECHAMENTO_FOLHA (estressor da série)"
    bifurcacao: "esqueleto estampável: qualquer evento no meio vira variação limpa"

