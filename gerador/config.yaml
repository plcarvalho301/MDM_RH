# =============================================================================
# MDM-RH — Config do gerador de massa ficticia (FOTO) — Reino Animal
# versao: v0.2 (retrofit — 3_massa_reino_animal_v0_3.md)
# -----------------------------------------------------------------------------
# TODOS os parametros AJUSTAVEIS do gerador vivem AQUI (Secao 9 da spec + os
# comportamentos herdados do gerador v0.1). O que NAO vive aqui e MODELO, nao
# parametro: as 43 unidades, o quadro FCE trilha-1 (decreto animalizado) e a
# escada de niveis estao no gen_massa.py — nomes de unidade sao editaveis la,
# a estrutura porte x quantidade nao (spec Secoes 2-4).
#
# GRAO / FRONTEIRA DE TABELA (schema v0.6 manda):
#   - `servidor` = grao VINCULO (1 linha por matricula). NAO tem sexo.
#   - pessoa.csv = grao PESSOA (1 linha por CPF): sexo, naturalidade. A tabela
#     `cadastro` nao existe no schema; o arquivo e emitido a parte, como no v0.1.
# =============================================================================

# --- reprodutibilidade (invariante 5: massa carrega carimbo de seed) ----------
seed: 42                      # OBRIGATORIO. Mesma seed = mesma massa.
data_referencia: ontem        # 'ontem' = D-1 dinamico; ou data fixa 'AAAA-MM-DD'.

# --- volumetria (spec Secao 6 / Secao 9) --------------------------------------
total_vinculos: 1300          # default da spec (pode subir)
split_sede_regionais: 75      # % na sede; resto nas 26 Tocas-Satelite (A3)
pct_acumulacao: 0.03          # % de CPFs com 2 matriculas (acumulacao licita — A4)

# --- jitter e soft floor (spec Secao 4) ---------------------------------------
jitter_range: [0.85, 1.15]    # fator global por seed; nunca infla acima do quadro
n_tocas_orfas: 4              # tocas sorteadas FORA do dom_unidade_eorg (KR 2.1)

# --- cargos efetivos (spec Secao 5; texto solto, sem FK) ----------------------
pct_cargo:
  Tecnico: 0.10               # so meio + meio-pequenas + Oficina de Casulos
  Agente: 0.05                # NUNCA tem funcao comissionada
  # Analista = residual (~85%)
tecnico_pode_fce: true

# --- topo (spec Secao 1) ------------------------------------------------------
lotacao_dg_vice: Câmara da Rainha

# --- pessoa (grao CPF — herdado do v0.1; alimenta pessoa.csv) -----------------
sexo:
  M: 0.60
  F: 0.40
geografia:
  DF_Brasilia: 0.70           # 70% Brasilia/DF; 30% demais capitais (lista no .py)
idade:
  min: 25
  max: 75                     # teto aposentadoria compulsoria
idade_ingresso:
  min: 25
  max: 45

# --- vinculo (herdado do v0.1 — coerencia temporal e o contrato com o futuro
#     gerador de eventos: nascimento -> ingresso -> tempo de casa -> classe) ---
regime:
  RJU: 0.97
  CLT: 0.03

# --- ARQUETIPOS (v0.3 — alinhamento com o designer) ---------------------------
# situacao/classe/padrao/afastamento NAO se sorteiam mais: EMERGEM da trajetoria
# do arquetipo (semente_trajetorias_v1.yaml — pesos Camada A do designer; Camada B
# plantada por contagem: Elias x2, Gerson x2, Vicente x1). O v0.2 tinha um sorteio
# demografico aqui (situacao:/classe_peso:/afastado_vigente_pct:) que era
# DESALINHADO do handoff do designer — morreu nesta versao.
disponibilidade_pct: 0.35     # dos ELEGIVEIS (ATIVO, sem funcao, ingresso <= 1995,
                              # sem intercorrencia vigente) — regra de negocio:
                              # disponibilidade so existiu p/ poucos ativos 1991-2000.
                              # Alvo ~1-2% do total; elegiveis sao raros (casa antiga).

exercicio_difere_lotacao_pct: 0.06  # % com exercicio != lotacao
nova_funcao_pct: 0.02         # % dos comissionados com funcao em transicao;
                              # data emitida em DDMMYYYY (exercita _data_iso do loader)

# --- gerador de eventos: calibracao (nao e regra de dominio) --------------------
# motivo default por situacao-alvo do DESLIGAMENTO. E ESCOLHA de geracao (varios
# motivos mapeiam p/ DESLIGADO), nao regra de dominio — por isso vive no config, nao
# no dom_motivo_deslig. Os ~14 casos-teste ganham motivo especifico na proxima fase.
deslig_default:
  DESLIGADO: "07"             # exoneracao a pedido
  INATIVO:   "38"             # aposentadoria voluntaria
