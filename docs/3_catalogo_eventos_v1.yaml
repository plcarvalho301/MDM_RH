// NOVO aqui (populados nesta versão):
dominios_novos:

  dom_afastamento:
    pk: cod_afastamento
    dono: "externo (Sigepe/eSocial — tabela S-2230)"
    natureza: fechado
    obs: >
      Referenciado pelo payload de AFASTAMENTO (campo cod_afastamento).
      Carrega os dois atributos de cálculo por motivo: conta_efetivo_exercicio (KR 2.2)
      e impacto_previdenciario. Fonte: Tabela de Domínios Sigepe/eSocial (corpus).
      Valores abaixo são os motivos mapeados — lista pode crescer na varredura do RH.
