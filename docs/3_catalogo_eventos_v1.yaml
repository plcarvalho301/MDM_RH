// ─────────────────────────────────────────────────────────────────────────────
// MDM-RH — CATÁLOGO DE EVENTOS  (v1.3, rascunho de trabalho)
// Catálogo PRINCIPAL do event store. Sub-domínios: cadastro, vinculos, intercorrencias, compensacao, jornada (+ desempenho/capacidades no catalogo_estendido).
// Data: 2026-06-22 | v1.1: 2026-07-05 | v1.2: 2026-07-05 | v1.3: 2026-07-05
//
// CHANGELOG v1.3 (reconciliação do Project — risco 1b):
//   - DESLIGAMENTO motivos 29/37 (redistribuição): resultado passa de texto livre
//     "transfere vínculo" para a situação TRANSFERIDO — 6º estado de dom_situacao_vinculo
//     (schema v0.14). Antes o valor era órfão (não existia como situação). Fraseamento
//     do estado (a frase deve indicar origem→destino→data) fica PENDENTE — ver ADR
//     Seção 2; consequência: payload de DESLIGAMENTO 29/37 precisará capturar órgão
//     destino (hoje ausente).
//
// CHANGELOG v1.2 (handoff Calculadora completa — folha + PSS):
//   - NOVO TIPO CONTRIBUICAO_PSS em `compensacao`. Faltava: o prespec §5 fixa
//     listaContribuicoesPSS (WS_SIAPE_CONSULTAS 4.22) como a OUTRA fonte da
//     Calculadora, ao lado de FECHAMENTO_FOLHA — só a folha tinha sido migrada
//     do catalogo_financeiro_v0_1. Payload: campos apurados do 4.22 (pág. 45) +
//     arrays datados do MESMO payload (férias/lpa/afastamentos/reclusão, pág. 44)
//     como ATRIBUTO (insumo de dias líquidos), NÃO evento espelho — não duplicar
//     AFASTAMENTO. Fonte do PSS é o SIAPE, não o eSocial: SEM piso temporal —
//     série cobre a vida funcional inteira do vínculo (há servidores pré-1995 na
//     folha); truncar em 2022/1999 simularia o eSocial em vez do SIAPE e abriria
//     buraco na série (= número de aposentadoria errado, prespec §5).
//   - mv_calculadora (schema) vira DUAS MVs por fronteira de payload
//     (mv_calculadora_folha, mv_calculadora_pss) — ver ADR-011.
//
// CHANGELOG v1.1 (sessão do handoff do designer / fechamento das lacunas ⚠1–3):
//   - ALTERACAO_FUNCAO.tipo_movimento distingue dispensa_pedido × dispensa_oficio
//     (valor de teste do arquétipo Sérgio depende disso).
//   - ⚠3 FECHADO (ADR-008): término/renovação de cessão e afastamento = data_fim
//     no payload (atributo de duração), NÃO evento-espelho, NÃO N encadeados.
//     Renovação sucessiva = N eventos com data_inicio distintas. Fechamento de
//     evento aberto (data_fim desconhecida na emissão — o caso da vida real) =
//     SEGUNDO registro imutável do MESMO tipo/chave com data_fim; projeção
//     coalesce (data_carga mais recente vence — padrão da folha suplementar).
//     Consequência no replay: intercorrência é INTERVALO que expira por data,
//     não par AFASTA/RETOMA. Ver obs em AFASTAMENTO e CESSAO.
//   - ⚠1/⚠2 FECHADOS via ADR-004 (motivo no payload, sem tipo novo): cassação de
//     aposentadoria = 2º DESLIGAMENTO sobre INATIVO (motivo local CASS_APOSENT);
//     anulação de provimento = DESLIGAMENTO motivo ANUL_PROVIMENTO ("nunca valeu
//     — decisão judicial"; semântica retroativa é da projeção, nunca rewrite).
//     + DEMI_OFICIO (demissão disciplinar, distinta de exoneração de ofício 08).
//     Verificado (2026-07-05): a Tabela de Domínios eSocial NÃO modela os três —
//     entram como motivos LOCAIS (e_esocial=false), via carga xlsx/csv.
//   - dom_motivo_deslig agora É tabela (schema v0.8; seed v0.2 seção 12).
//   - PROGRESSAO: regra trivial p/ massa fechada (portaria mensal na competência
//     do ingresso; grade EPPGG do seed §9; interstício 12m). Gate ativo=false
//     permanece = fora da Calculadora, NÃO bloqueia geração/registro.
//
// RELAÇÃO COM OS OUTROS ARQUIVOS DO CORPUS
//   - Este é o catálogo principal de eventos. Mora junto: vínculos, compensação,
//     e qualquer eixo futuro que nasça POR USO.
//     vivem no 3_catalogo_estendido_v1 (eixo profissional), SEPARADO de propósito:
//     dependência
//     externa e está fora do escopo de descoberta atual. NÃO foi fundido aqui.
//   - `catalogo_financeiro_v0_1.yaml` foi ABSORVIDO por este arquivo (Parte do
//     eixo compensação abaixo). O arquivo solto MORRE — não subir mais ao corpus.
//   - `3_depara_vinculo_v0_4.md` (+ `3_depara_cadastro_v0_1.md`) é a FOTO (estado vigente live; o que o servidor vê no
//     SouGov). NÃO é evento. Os eventos aqui são a face-histórico do que, na foto,
//     é o face-agora.
//
// REGRA DE FRONTEIRA FOTO × EVENTO (fechada nesta sessão)
//   FOTO  = o vigente live (o que o SouGov mostra ao servidor). Sempre existe.
//   EVENTO = a série datada DAQUILO QUE PRECISA SER CATEGORIZADO OU EXIBIDO.
//   O tipo de evento nasce POR USO (categorizar p/ Calculadora, ou exibir no
//   Filme) — não por completude do mundo. MDM é SoR, não SoT: o que fica só na
//   foto e ninguém precisa como histórico NÃO vira evento.
//   MAS: uma vez que o tipo existe, a SÉRIE é EXAUSTIVA dentro do escopo dele —
//   completude de série É a função do evento (ex.: cálculo de aposentadoria de
//   quem entrou em 1982 exige TODOS os fechamentos de folha, não uma amostra).
//
// DOIS EIXOS ORTOGONAIS (herdados do envelope `evento`, sem campo novo)
//   natureza : FOTO/sobrescreve | event-aditivo | event-transição
//   origem   : cod_mecanica = {ingestao, extracao}
//   A separação natureza vs. origem, e o ONDE ela é decidida (no fluxo de
//   ingestão, não na fonte), está fechada em ADR-006.
// ─────────────────────────────────────────────────────────────────────────────


// =============================================================================
// PARTE 1 — EXTENSÃO DE `sub_dominio_dom`
// =============================================================================
// Lembrete: sub-domínio `vinculo` usa classe_transicao (máquina de estados);
// sub-domínios aditivos têm classe_transicao NULA.

sub_dominio_dom:

  - cod_sub_dominio: cadastro
    descricao: "Raiz cadastral do servidor (identidade): nome, CPF, filiação, endereço."
    classe_transicao: null
    obs: >
      Módulo próprio no Sigepe ("Validação Cadastral"). Quase 100% face-FOTO
      (vigente, sobrescreve) — provavelmente NÃO gera evento (SoR, não SoT:
      ninguém historiza mudança de endereço). Gaveta existe para o dado existir
      live; só vira evento se algum dado de identidade precisar de trajetória.

  - cod_sub_dominio: vinculos
    descricao: "Eventos que transitam o estado do vínculo do servidor."
    classe_transicao: aplicavel            # máquina de estados; replay deriva situacao_funcional
    obs: >
      JÁ DECLARADO no envelope. Formalizado AQUI pela primeira vez. Fonte:
      eSocial via Sigepe (S-22xx). A FOTO consome o ESTADO RESOLVIDO deste
      sub-domínio (situacao_funcional vigente); o histórico consome a SÉRIE.
      Exercício NÃO é gaveta própria — é atributo do vínculo (órgão de vínculo ×
      órgão de exercício coexistem na cessão; multi-vínculo = N por CPF).

  - cod_sub_dominio: intercorrencias
    descricao: "Afastamentos, licenças, férias — intervalos sobre o vínculo, sem encerrá-lo."
    classe_transicao: aplicavel            # AFASTA/RETOMA; o vínculo persiste, a intercorrência é um intervalo
    obs: >
      Separado de `vinculos` de propósito: afastamento NÃO muda o laço — o servidor
      continua vinculado, só está afastado. Outra natureza. Um tipo de evento
      (AFASTAMENTO); o motivo (S-2230) está no payload e referencia dom_afastamento,
      que carrega conta_efetivo_exercicio (KR 2.2) e impacto previdenciário por motivo.

  - cod_sub_dominio: jornada
    descricao: "Execução do trabalho: entregas e planos de trabalho do PGD."
    classe_transicao: null
    obs: >
      Lado EXECUÇÃO do PGD (o que foi entregue/trabalhado), distinto da AVALIAÇÃO
      (que é `desempenho`). Gaveta declarada, VAZIA por ora: sem ponto eletrônico
      e sem ingestão de PGD hoje. Existe para receber quando a fonte abrir.

  - cod_sub_dominio: compensacao
    descricao: "Fechamentos de folha de pagamento e contribuições PSS (remuneração/previdência histórica)."
    classe_transicao: null                 # ADITIVO. Nem folha nem PSS transitam vínculo; só somam/registram.
    obs: >
      Migrado do catalogo_financeiro_v0_1 (absorvido). Log aditivo. DUAS fontes
      (prespec §5): FECHAMENTO_FOLHA (consultaDadosFinanceirosHistorico, SIAPE) e
      CONTRIBUICAO_PSS (listaContribuicoesPSS, WS_SIAPE_CONSULTAS 4.22). Completude
      de série exaustiva é a função (cálculo de aposentadoria) — vale p/ os dois tipos.


// =============================================================================
// PARTE 2 — CLASSES DE TRANSIÇÃO DO VÍNCULO  (`classe_transicao_dom`)
// =============================================================================
// O sub-domínio vinculos é máquina de estados. Cada tipo de evento de vínculo
// carrega uma classe de transição que diz COMO ele move o estado. Derivado da
// Tabela de Domínios eSocial/Sigepe (coluna "Impacto Previdenciário" + situação).

classe_transicao_dom:
  - { cod_classe_transicao: INICIO,    descricao: "Inicia o vínculo (Ativo)." }
  - { cod_classe_transicao: AFASTA,    descricao: "Suspende/afasta mantendo o vínculo; tem retorno." }
  - { cod_classe_transicao: RETOMA,    descricao: "Retorna de afastamento/inatividade para Ativo." }
  - { cod_classe_transicao: ALTERA,    descricao: "Altera atributo do vínculo vigente sem mudar a situação (cargo/função/lotação)." }
  - { cod_classe_transicao: CEDE,      descricao: "Move para exercício em outro órgão (Cedido), vínculo de origem mantido." }
  - { cod_classe_transicao: ENCERRA,   descricao: "Encerra o vínculo (Desligado/Inativo)." }


// =============================================================================
// PARTE 3 — `tipo_evento_dom`  —  EIXO VÍNCULO  (INSERTs)
// =============================================================================
// Derivado DIRETO da Tabela de Domínios eSocial/Sigepe (corpus). Cada tipo traz:
//   - cod_classe_transicao (Parte 2)
//   - evento_esocial=true + codigo_esocial (o leiaute que o origina)
//   - cod_impacto_previdenciario (da coluna da tabela — parâmetro de cálculo)
//   - conta_efetivo_exercicio só se aplica a AFASTA (KR 2.2); senão herda do estado
//
// NOTA DE FONTE: o RETROATIVO de cargo/lotação/função/classe NÃO vem da API
//   (sem endpoint *Historico). Estes tipos EXISTEM no catálogo; a alimentação
//   histórica deles é Extrator (varredura — ver 3_arqueologia_extrator_v0_1.yaml)
//   ou diff da FOTO pós-go-live. O Extrator NÃO é procurado por nome *HISTORICO:
//   é qualquer arquivo cujo grão seja fato datado (matrícula repete com datas).
//   O catálogo nasce completo; a série retroativa é o buraco, e o ledger é o mapa.

tipo_evento_dom:

  // ── INÍCIO ─────────────────────────────────────────────────────────────────
  - cod_tipo_evento: PROVIMENTO
    nome: "Nomeação / posse — início do vínculo"
    cod_sub_dominio: vinculos
    cod_classe_transicao: INICIO
    evento_esocial: true
    codigo_esocial: "S-2200"
    cod_impacto_previdenciario: INICIO        # "Inicia vínculo previdenciário no RPPS ou RGPS"
    ativo: true
    obs: "Situação resultante: Ativo. Data de ingresso vem datada na própria consultaDadosFuncionais (não precisa de Extrator p/ a abertura)."

  // ── ALTERAÇÃO DE ATRIBUTO DO VÍNCULO ────────────────────────────────────────
  - cod_tipo_evento: ALTERACAO_FUNCAO
    nome: "Designação / dispensa / exoneração de função comissionada"
    cod_sub_dominio: vinculos
    cod_classe_transicao: ALTERA
    evento_esocial: true
    codigo_esocial: "S-2206"                  # nmFuncao
    cod_impacto_previdenciario: ALTERA_BASE   # "Altera base de cálculo; pode incidir sobre parcela comissionada / teto"
    ativo: true
    obs: "Não muda situacao_funcional; atualiza funcao_comissionada na FOTO. Série histórica = retroativo (buraco)."

  - cod_tipo_evento: REMOCAO
    nome: "Remoção — mudança de unidade interna (lotação)"
    cod_sub_dominio: vinculos
    cod_classe_transicao: ALTERA
    evento_esocial: true
    codigo_esocial: "S-2206"                  # dtAlteracao
    cod_impacto_previdenciario: NEUTRO        # "Mantém recolhimento intacto; muda apenas a UORG"
    ativo: true
    obs: "Muda cod_unidade_lotacao. Série histórica de lotação = retroativo (buraco / hipótese COBOL)."

  - cod_tipo_evento: PROGRESSAO
    nome: "Progressão / promoção — mudança de classe/padrão na carreira"
    cod_sub_dominio: vinculos
    cod_classe_transicao: ALTERA
    evento_esocial: false                     # NÃO há leiaute eSocial próprio; deriva de mudança de classe/padrão
    codigo_esocial: null
    cod_impacto_previdenciario: ALTERA_BASE
    ativo: false                              # GATE: parâmetros de carreira a fechar com RH antes de entrar na Calculadora
    obs: >
      A FOTO traz classe/padrão VIGENTES (consultaDadosFuncionais: codClasse/
      codPadrao). A progressão é a mudança DATADA disso. Sem leiaute eSocial —
      é inferida de diff de classe/padrão. ativo=false até o RH fechar regras de
      carreira (interstício, requisitos). Candidato a evento de extração no retroativo.

  // ── AFASTAMENTO  (um tipo, motivo no payload via dom_afastamento) ────────────
  - cod_tipo_evento: AFASTAMENTO
    nome: "Afastamento / licença (motivo no payload)"
    cod_sub_dominio: intercorrencias
    cod_classe_transicao: AFASTA
    evento_esocial: true
    codigo_esocial: "S-2230"
    cod_impacto_previdenciario: VARIAVEL      # depende do motivo — vem de dom_afastamento, NÃO fixo no tipo
    ativo: true
    obs: >
      UM tipo de evento; o MOTIVO (cód. S-2230) está no payload e referencia
      dom_afastamento, que carrega conta_efetivo_exercicio (KR 2.2) e o impacto
      previdenciário POR motivo. Fonte histórica COMPLETA: consultaDadosAfastamento-
      Historico (datado, ingestão direta — NÃO é buraco). Inclui os ~20 motivos da
      Tabela de Domínios (doença, maternidade, licenças, disponibilidade cód.31, etc).

  // ── CESSÃO ───────────────────────────────────────────────────────────────────
  - cod_tipo_evento: CESSAO
    nome: "Cessão / exercício em outro órgão"
    cod_sub_dominio: vinculos
    cod_classe_transicao: CEDE
    evento_esocial: true
    codigo_esocial: "S-2231"                  # dtIniCessao
    cod_impacto_previdenciario: MANTEM_ORIGEM # "Mantém recolhimento na origem, conforme ônus da cessão"
    ativo: true
    obs: "Situação resultante: Cedido. Também aparece como S-2230 cód.40 (afastamento p/ cessão) — reconciliar na ingestão."

  // ── RETORNO ──────────────────────────────────────────────────────────────────
  - cod_tipo_evento: RETORNO_VINCULO
    nome: "Reversão / recondução / reintegração — retorno ao serviço"
    cod_sub_dominio: vinculos
    cod_classe_transicao: RETOMA
    evento_esocial: true
    codigo_esocial: "S-2298"                  # tpReint: 1=reintegração, 3=reversão, 4=recondução
    cod_impacto_previdenciario: RETOMADA      # "Transição de Inativo para Ativo; restaura contribuição integral"
    ativo: true
    obs: >
      tpReint distingue o sub-motivo no payload: 1=Reintegração (refaz averbação
      retroativa), 3=Reversão (Inativo->Ativo), 4=Recondução. Situação resultante: Ativo.

  // ── ENCERRAMENTO  (um tipo, motivo de desligamento no payload) ───────────────
  - cod_tipo_evento: DESLIGAMENTO
    nome: "Desligamento / aposentadoria / vacância / óbito (motivo no payload)"
    cod_sub_dominio: vinculos
    cod_classe_transicao: ENCERRA
    evento_esocial: true
    codigo_esocial: "S-2299"                  # mtvDeslig
    cod_impacto_previdenciario: FIM           # encerra (exoneração/vacância/óbito) OU transição p/ Inativo (aposentadoria)
    ativo: true
    obs: >
      UM tipo; o mtvDeslig está no payload e separa os casos da Tabela de Domínios:
      07/08=exoneração (Fim/Desligado), 09=óbito (Fim), 25=vacância (Fim),
      38/39=aposentadoria (Inativo, NÃO Desligado — transição p/ inativo), 29/37=
      redistribuição (transfere vínculo). Situação resultante depende do motivo —
      por isso o motivo é payload, não tipos separados.


// =============================================================================
// PARTE 4 — `tipo_evento_dom`  —  EIXO FINANCEIRO  (migrado, absorvido)
// =============================================================================
  - cod_tipo_evento: FECHAMENTO_FOLHA
    nome: "Fechamento de folha de pagamento (competência)"
    cod_sub_dominio: compensacao
    cod_classe_transicao: null               # aditivo
    evento_esocial: false
    codigo_esocial: null
    cod_impacto_previdenciario: null         # impacto é DERIVADO no cálculo, não rótulo do evento
    ativo: true
    obs: >
      O FATO é o fechamento da folha (RH fecha em bloco, no mês). UM evento = UMA
      competência de UM servidor (por vínculo). cod_mecanica=ingestao p/ a parte
      SIAPE; o retroativo pré-SIAPE (até 1982) é extração/papel. Completude de
      série EXAUSTIVA é a função (cálculo de aposentadoria).

  - cod_tipo_evento: CONTRIBUICAO_PSS
    nome: "Contribuição PSS (competência)"
    cod_sub_dominio: compensacao
    cod_classe_transicao: null               # aditivo — não move vínculo
    evento_esocial: false
    codigo_esocial: null
    cod_impacto_previdenciario: null
    cod_mecanica: ingestao                   # vem da API 4.22 (listaContribuicoesPSS)
    ativo: true
    obs: >
      Handoff Calculadora completa (2026-07-05): faltava — prespec §5 fixa a
      Calculadora com DUAS fontes (PSS + folha); só a folha tinha migrado do
      catalogo_financeiro_v0_1. UM evento = UMA competência de PSS de UM vínculo
      (WS_SIAPE_CONSULTAS 4.22, listaContribuicoesPSS). SEM PISO TEMPORAL: fonte é
      o SIAPE, não o eSocial — a série cobre a vida funcional inteira do vínculo
      (há servidores pré-1995 na folha); truncar em 2022/1999 simula o eSocial em
      vez do SIAPE e abre buraco na série = número de aposentadoria errado.


// =============================================================================
// PARTE 5 — PAYLOADS  (schema fechado por tipo)
// =============================================================================
// Proveniência (cod_origem, cod_mecanica, grau_confianca, documento_fonte) vive
// no envelope `evento`, não se repete aqui. data_efeito do envelope = data do fato.

payloads:

  // ── VÍNCULO ──────────────────────────────────────────────────────────────────

  PROVIMENTO:
    descricao: "Início do vínculo."
    campos:
      - { campo: cod_ocorrencia_ingresso, tipo: text, obrig: false, obs: "codOcorrIngressoServPublico da API" }
      - { campo: cargo_inicial,   tipo: text, obrig: false, ref: dom_cargo }
      - { campo: regime_juridico,  tipo: text, obrig: false, ref: dom_regime_juridico }

  ALTERACAO_FUNCAO:
    descricao: "Designação/dispensa/exoneração de função comissionada."
    campos:
      - { campo: cod_funcao,   tipo: text, obrig: false, ref: dom_funcao, obs: "nula = dispensa (saiu da função)" }
      - { campo: nome_funcao,  tipo: text, obrig: false }
      - { campo: tipo_movimento, tipo: text, obrig: true, obs: "{designacao, dispensa_pedido, dispensa_oficio, exoneracao} — v1.1: dispensa desdobrada (a pedido × de ofício; teste do Sérgio)" }

  REMOCAO:
    descricao: "Mudança de unidade de lotação."
    campos:
      - { campo: cod_unidade_origem,  tipo: int, obrig: false, ref: dom_unidade_eorg }
      - { campo: cod_unidade_destino, tipo: int, obrig: true,  ref: dom_unidade_eorg }

  PROGRESSAO:
    descricao: "Mudança datada de classe/padrão na carreira."
    campos:
      - { campo: classe_origem,  tipo: text, obrig: false, ref: dom_classe }
      - { campo: classe_destino, tipo: text, obrig: false, ref: dom_classe }
      - { campo: padrao_origem,  tipo: text, obrig: false, ref: dom_padrao }
      - { campo: padrao_destino, tipo: text, obrig: false, ref: dom_padrao }
      - { campo: tipo_progressao, tipo: text, obrig: false, obs: "{progressao, promocao} — a confirmar regras com RH (gate ativo=false)" }

  AFASTAMENTO:
    descricao: "Afastamento/licença. O MOTIVO carrega os parâmetros de cálculo."
    campos:
      - { campo: cod_afastamento, tipo: text, obrig: true, ref: dom_afastamento,
          obs: "código S-2230. Carrega conta_efetivo_exercicio (KR 2.2) e impacto previdenciário POR motivo." }
      - { campo: data_inicio, tipo: date, obrig: true }
      - { campo: data_fim,    tipo: date, obrig: false,
          obs: >
            nula = vigente em aberto. FECHAMENTO (ADR-008): quando o fim se torna
            conhecido, emite-se SEGUNDO registro imutável do mesmo tipo com a mesma
            chave (matricula, cod_afastamento, data_inicio) e data_fim preenchida;
            a projeção coalesce (data_carga mais recente vence). Renovação = N
            eventos com data_inicio distintas. Replay trata como INTERVALO. }

  CESSAO:
    descricao: "Cessão para outro órgão."
    // PENDÊNCIA DE INGESTÃO (não é modelagem — requer regra com RH):
    //   Cessão aparece em DUAS formas na fonte:
    //     (a) S-2231 (CESSAO próprio, dtIniCessao) — leiaute de movimentação.
    //     (b) S-2230 cód.40 (afastamento "exercício em outro órgão") — leiaute de afastamento.
    //   São o mesmo fato funcional com dois espelhos. Cenários esquisitos existem
    //   (ex.: servidor cedido que também tem afastamento médico no mesmo período).
    //   Regra de reconciliação — qual ingere, ou como deduplicar sem perder o cód.40
    //   no dom_afastamento — precisa ser fechada com o RH antes da pipeline de ingestão.
    //   Até lá: o event store pode receber os dois; a projeção decide qual prevalece.
    campos:
      - { campo: orgao_cessionario, tipo: text, obrig: false }
      - { campo: data_inicio,       tipo: date, obrig: true,  obs: "dtIniCessao" }
      - { campo: data_fim,          tipo: date, obrig: false,
          obs: "mesma regra de fechamento/coalescência do AFASTAMENTO (ADR-008); expirada a data_fim, o replay devolve o vínculo à origem SEM evento de retorno" }
      - { campo: onus,              tipo: text, obrig: false, obs: "{com_onus, sem_onus} — afeta repasse previdenciário" }

  RETORNO_VINCULO:
    descricao: "Reversão/recondução/reintegração."
    campos:
      - { campo: tipo_retorno, tipo: text, obrig: true,
          obs: "{reintegracao (tpReint=1), reversao (=3), reconducao (=4)}" }

  DESLIGAMENTO:
    descricao: "Encerramento do vínculo. O MOTIVO determina a situação resultante."
    campos:
      - { campo: cod_motivo_deslig, tipo: text, obrig: true, ref: dom_motivo_deslig,
          obs: >
            mtvDeslig (S-2299). Separa: 07/08=exoneração, 09=óbito, 25=vacância,
            38/39=aposentadoria (-> Inativo, não Desligado), 29/37=redistribuição.
            A situação resultante (Desligado vs Inativo) é DERIVADA deste código." }
      - { campo: data_desligamento, tipo: date, obrig: true }

  // ── FINANCEIRO  (migrado integralmente do catalogo_financeiro_v0_1) ──────────

  FECHAMENTO_FOLHA:
    descricao: "Conjunto de rubricas de UMA competência fechada (espelha consultaDadosFinanceirosHistorico)."
    campos:
      - { campo: mes_competencia, tipo: text, obrig: true,
          obs: "AAAAMM. A que mês a remuneração se REFERE. Chave de coalescência." }
      - { campo: mes_pagamento, tipo: text, obrig: true,
          obs: "AAAAMM. Quando entrou na folha. ≠ competência no suplementar/retroativo. CRÍTICO p/ PSS." }
      - { campo: tipo_fechamento, tipo: text, obrig: true,
          obs: "{normal, suplementar} — MAPEIA indicadorMovSupl da API. Suplementar SOMA (valor pode ser negativo)." }
      - campo: rubricas
        tipo: "list<obj>"
        obrig: true
        obs: "A folha como veio. Lista, não tabela relacional. dom_rubrica fica p/ o futuro (verificação de erro)."
        item:
          - { campo: cod_rubrica,   tipo: int,     obrig: true,  obs: "codRubrica; ref futura dom_rubrica" }
          - { campo: nome_rubrica,  tipo: text,    obrig: true,  obs: "nomeRubrica" }
          - { campo: valor_rubrica, tipo: numeric, obrig: true,  obs: "valorRubrica COM SINAL; negativo somado como -X" }
          - { campo: indicador_rd,  tipo: text,    obrig: true,  obs: "{R,D} rendimento/desconto; sem isto a soma não fecha" }
          - { campo: numero_seq,    tipo: int,     obrig: true,  obs: "numeroSeq; preserva ordem" }
          - { campo: prazo_rubrica,  tipo: int,    obrig: false, obs: "pzRubrica" }
          - { campo: periodo_rubrica, tipo: int,   obrig: false, obs: "peRubrica" }
          - { campo: data_ano_mes_rubrica, tipo: text, obrig: false, obs: "dataAnoMesRubrica" }
    # COALESCÊNCIA: chave = mes_competencia + vínculo. Suplementar SOMA à competência
    #   (inclui valor negativo). Retificação-que-substitui: vale o mes_pagamento mais
    #   recente. QUAL caso aplica é decisão do cálculo/RH, não do MDM. Event store
    #   guarda os dois fechamentos imutáveis; a projeção decide. Não há cod_folha:
    #   a API §4.20 não entrega tipo de folha; 13º/férias são RUBRICAS (projeção por cod_rubrica).

  CONTRIBUICAO_PSS:
    descricao: "Contribuição PSS de UMA competência (espelha listaContribuicoesPSS, WS_SIAPE_CONSULTAS 4.22)."
    campos:
      - { campo: gr_matricula,             tipo: int,     obrig: true,  obs: "matrícula do vínculo (chave)" }
      - { campo: ano_contribuicao,         tipo: int,     obrig: true,  obs: "AnoContribuicoesPSS" }
      - { campo: mes_contribuicao,         tipo: int,     obrig: true,  obs: "MesContribuicoesPSS — junto com ano_contribuicao é a chave de coalescência" }
      - { campo: indice_reajuste,          tipo: int,     obrig: false, obs: "indiceReajuste" }
      - { campo: pss_apurado,              tipo: int,     obrig: true,  obs: "pssApurado — contribuição apurada" }
      - { campo: pss_informado,            tipo: int,     obrig: false, obs: "pssInformado — contribuição informada" }
      - { campo: remuneracao_pss,          tipo: numeric, obrig: true,  obs: "remuneracaoPss — base de cálculo" }
      - { campo: remuneracao_pss_ajustada, tipo: numeric, obrig: false, obs: "remuneracaoPssAjustada" }
      - campo: ferias
        tipo: "list<obj>"
        obrig: false
        obs: "Arrays datados do MESMO payload 4.22 (insumo de dias líquidos; NÃO planificados na MV — ver mv_calculadora_pss)."
        item:
          - { campo: data_ini, tipo: date, obrig: true }
          - { campo: data_fim, tipo: date, obrig: true }
      - campo: lpa
        tipo: "list<obj>"
        obrig: false
        obs: "Licença-prêmio por assiduidade."
        item:
          - { campo: data_ini, tipo: date, obrig: true }
          - { campo: data_fim, tipo: date, obrig: true }
      - campo: afastamentos
        tipo: "list<obj>"
        obrig: false
        obs: >
          SE SOBREPÕE ao evento AFASTAMENTO (intercorrencias) — mesmo fato, dois
          espelhos (4.1 vigente × 4.22 PSS). NÃO duplicar como evento; aqui só
          entra como atributo do payload PSS p/ o cálculo de dias líquidos. Qual
          fonte é autoritativa é proveniência multi-fonte, ADR aberta (prespec §7.1).
        item:
          - { campo: cod_ocorrencia,  tipo: int,  obrig: false }
          - { campo: desc_ocorrencia, tipo: text, obrig: false }
          - { campo: data_ini,        tipo: date, obrig: true }
          - { campo: data_fim,        tipo: date, obrig: false }
      - campo: reclusao
        tipo: "list<obj>"
        obrig: false
        item:
          - { campo: data_ini, tipo: date, obrig: true }
    # COALESCÊNCIA: chave = (ano_contribuicao, mes_contribuicao) + vínculo. SEM PISO
    #   TEMPORAL: a fonte é o SIAPE, não o eSocial — série cobre a vida funcional
    #   inteira (provimento até a competência atual), não só pós-ago/2022. Buraco na
    #   série = número de aposentadoria errado (prespec §5). Os arrays datados acima
    #   NÃO viram evento AFASTAMENTO separado — ver obs do campo `afastamentos`.


// =============================================================================
