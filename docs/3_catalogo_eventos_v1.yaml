      - { cod: "15", nome: "Gozo de Férias ou Recesso",                esocial: "S-2230 cód.15", conta_efetivo_exercicio: sim,     impacto_previdenciario: "mantém (Ativo)" }
      - { cod: "17-20,35,43", nome: "Licença Maternidade (e variantes)", esocial: "S-2230 cód.17-20,35,43", conta_efetivo_exercicio: sim, impacto_previdenciario: "mantém (Ativo)" }
      - { cod: "10", nome: "Licença Estatutária COM remuneração",      esocial: "S-2230 cód.10", conta_efetivo_exercicio: sim,     impacto_previdenciario: "mantém (Ativo)" }
