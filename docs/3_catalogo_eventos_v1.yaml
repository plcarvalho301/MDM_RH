      - { cod: "DEMI_OFICIO",     nome: "Demissão de ofício (penalidade disciplinar)",   resultado: Desligado, e_esocial: false }
      - { cod: "CASS_APOSENT",    nome: "Cassação de aposentadoria",                     resultado: Desligado, e_esocial: false, obs: "2º DESLIGAMENTO sobre estado Inativo (arquétipo Gerson)" }
      - { cod: "ANUL_PROVIMENTO", nome: "Anulação de provimento (decisão judicial)",     resultado: Desligado, e_esocial: false, obs: "'nunca valeu': semântica retroativa é da projeção/Calculadora, nunca rewrite da série (arquétipo Vicente)" }


// =============================================================================
// PARTE 7 — PENDÊNCIAS / DECISÕES EM ABERTO
// =============================================================================
decisoes_em_aberto:

  - item: "PROGRESSAO sem leiaute eSocial"
    estado: >
      Progressão/promoção não tem S-22xx próprio — é inferida de diff de classe/
      padrão. ativo=false (fora da Calculadora) até o RH fechar regras de carreira.
      v1.1 — ESCLARECIDO: o gate vale SÓ para a Calculadora; classifica()/registro
      NÃO checam ativo — a massa gera e grava PROGRESSAO normalmente. Regra trivial
      p/ massa (fechada 2026-07-05): portaria mensal — progride no mês da competência
      do ingresso, a cada interstício de 12 meses, um degrau da grade EPPGG
      (seed §9: A/B/C/Especial × I–V, 20 degraus ≈ 20 anos), para no teto.
      Segue candidata a evento de EXTRAÇÃO no retroativo.
    quem_decide: "RH (regras REAIS de carreira, p/ Calculadora) + você (fonte do retroativo)."

  - item: "Retroativo de cargo/lotação/função/classe"
    estado: >
      Os tipos ALTERACAO_FUNCAO, REMOCAO, PROGRESSAO existem, mas a série
      histórica deles NÃO vem da API (sem *Historico). Alimentação: diff da FOTO
      pós-go-live (futuro, de graça) + Extrator (retroativo) + papel pré-SIAPE (OCR).
      O catálogo está completo; a alimentação tem o buraco.
      REFRAME (2026-06-22): a fonte do Extrator NÃO é um arquivo *HISTORICO — é
      qualquer arquivo dos 274 cujo grão seja fato datado (matrícula repete com
      datas distintas). O COMO entra está em `3_arqueologia_extrator_v0_1.yaml`
      (protocolo de varredura + ledger). Candidato nº1: SIAPE-ANO-MES-SSER (grão
      mensal). A varredura roda na extração planejada p/ AGOSTO (kickoff julho) —
      é cronograma, não risco aberto. Cada arquivo FONTE_EVENTO liga a estes tipos
      por cod_mecanica=extracao.
    quem_decide: "Você (varredura Extrator, ledger arqueologia) + RH (profundidade necessária)."

  - item: "Completude financeira até 1982"
    estado: >
      FECHAMENTO_FOLHA exige série exaustiva p/ cálculo de aposentadoria. API cobre
      o período SIAPE; pré-SIAPE é papel (não-estimável). É a alimentação mais cara
      do projeto. Modelo aguenta; o custo é de garimpo.
      NOTA (2026-06-22): dentro do período SIAPE, SIAPE-ANO-MES-SSER (Extrator) é
      candidato a fonte de fechamento mensal em massa — ver ledger em
      `3_arqueologia_extrator_v0_1.yaml`. NÃO cobre pré-SIAPE (papel/OCR, Tier 3,
      Fase 5). A Fita Espelho NÃO serve de retroativo: é snapshot mensal que
      sobrescreve (manual Fita p.6), só teria histórico quem arquivou cada CSV.
    quem_decide: "PM — dimensionamento de garimpo (Fase 5)."

  - item: "Reconciliação CESSAO: S-2231 vs S-2230 cód.40"
    estado: "Cessão aparece como evento próprio (S-2231) e como afastamento (S-2230 cód.40). Decidir qual ingere ou como reconciliar p/ não duplicar. Ver comentário no payload de CESSAO."
    quem_decide: "Você (pipeline de ingestão) + RH (regras de cenários esquisitos — ex.: cedido com afastamento médico simultâneo)."

  - item: "[FECHADO v1.1 → ADR-008] Término/renovação de cessão e afastamento (⚠3 do designer)"
    estado: >
      data_fim como atributo de duração; fechamento de evento aberto por SEGUNDO
      registro do mesmo tipo/chave; coalescência por data_carga (mais recente vence);
      renovação = N eventos. Replay trata intercorrência como INTERVALO que expira
      por data — SEM par AFASTA/RETOMA. Impacto no replay do pipeline: validar no
      smoke test antes de estampar massa (higiene barata, não portão).
    quem_decide: "Fechado (Tech Lead, 2026-07-05). Ver ADR-008."

  - item: "[FECHADO v1.1 → ADR-004] Cassação de aposentadoria e anulação de provimento (⚠1/⚠2)"
    estado: >
      Sem tipo novo: motivos locais de DESLIGAMENTO (CASS_APOSENT, ANUL_PROVIMENTO,
      + DEMI_OFICIO). Reversão de DOMÍNIO (fato real que reverte estado) ≠ retratação
      OPERACIONAL (defeito de dado — ADR-009). Não confundir as fixtures de teste.
    quem_decide: "Fechado (Tech Lead + PM, 2026-07-05); rótulos finais revisáveis com RH/Corregedoria."

  - item: "Chave de deduplicação do loader de AFASTAMENTO"
    estado: >
      A API (consultaDadosAfastamentoHistorico) pode devolver o mesmo afastamento
      em chamadas distintas. Chave candidata: (matricula, cod_afastamento, data_inicio).
      Caso edge: afastamento cancelado e reiniciado com mesmo código e mesma data_inicio
      — a chave colide mas são fatos distintos. Decisão trivial de pipeline; o dev resolve.
    quem_decide: "Dev (loader de AFASTAMENTO). Não depende de RH."

  - item: "Máquina de estados com vínculo simultâneo (acumulação lícita)"
    estado: >
      O corpus sabe que 1 CPF tem N matrículas (N vínculos). O que não está explicitado:
      cada matrícula corre sua PRÓPRIA máquina de estados de forma independente. No replay,
      o estado de um vínculo NÃO interfere no estado do outro. Consequência concreta:
        - Um servidor com dois cargos acumuláveis pode estar Ativo em um e Afastado no outro
          simultaneamente — isso é correto, não anomalia.
        - A situacao_funcional na FOTO é por matrícula, não por CPF. Não existe "situação do
          servidor" — existe "situação do vínculo X".
        - A Calculadora precisa somar/analisar vínculos separadamente antes de agregar.
      Isso precisa estar explícito no schema do evento (chave inclui matricula, não só CPF)
      e na documentação da pipeline — senão o primeiro caso de acumulação derruba o pipeline.
    quem_decide: "Você (modelagem/pipeline). Não depende de RH — é consequência direta do dado 1 CPF : N matrículas já fechado."
